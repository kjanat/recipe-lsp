name: Gate release
description: Gate a release by requiring two JSON files to expose the same top-level version.

inputs:
  file1:
    description: First JSON file.
    required: true
  file2:
    description: Second JSON file.
    required: false
    default: package.json

outputs:
  file1-version:
    description: Version read from the first file.
    value: ${{ steps.meta.outputs.v1 }}
  file2-version:
    description: Version read from the second file.
    value: ${{ steps.meta.outputs.v2 }}
  match:
    description: Whether both versions match.
    value: ${{ steps.meta.outputs.match }}

runs:
  using: composite
  steps:
    - id: meta
      shell: pwsh
      env: { INPUTS: "${{ toJSON(inputs) }}" }
      run: |
        $ErrorActionPreference = 'Stop'

        $esc = { param([AllowNull()][string] $s) ($s ?? '').Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A') }
        $escProp = { param([AllowNull()][string] $s) (&$esc $s).Replace(':', '%3A').Replace(',', '%2C') }

        $setOutput = { param([hashtable] $o) $o.GetEnumerator() | ForEach-Object { "$($_.Key)=$($_.Value)" } | Out-File -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8 -Append }
        $resolve = { param([string] $p) if ([System.IO.Path]::IsPathFullyQualified($p)) { $p } else { Join-Path $env:GITHUB_WORKSPACE $p } }
        $fail = { param([string] $m, [string] $f) $msg = &$esc $m; if ($f) { $file = &$escProp $f; "::error file=$file,title=Version gate::$msg" } else { "::error title=Version gate::$msg" }; exit 1 }

        $in = $env:INPUTS | ConvertFrom-Json

        $readVersion = {
          param([string] $file)

          $path = &$resolve $file

          if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
            &$fail "File not found: $file" $file
          }

          try {
            $json = Get-Content -LiteralPath $path -Raw | ConvertFrom-Json
          } catch {
            &$fail "Invalid JSON: $($_.Exception.Message)" $file
          }

          $version = $json.PSObject.Properties['version']?.Value

          if ([string]::IsNullOrWhiteSpace([string] $version)) { &$fail 'Missing or empty top-level .version field.' $file }

          [string] $version
        }

        $v1 = (&$readVersion $in.file1).Trim()
        $v2 = (&$readVersion $in.file2).Trim()

        if ($v1 -ne $v2) {
          &$setOutput @{ v1 = $v1; v2 = $v2; match = 'false' }
          &$fail "Version mismatch: $($in.file1) has $v1, but $($in.file2) has $v2." $null
        }

        &$setOutput @{ v1 = $v1; v2 = $v2; match = 'true' }
