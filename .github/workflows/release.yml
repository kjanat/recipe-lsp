name: Release
on: { push: { tags: ["v*"] }, workflow_dispatch: null }
permissions: { contents: read, id-token: write }
jobs:
  gate:
    runs-on: ubuntu-slim
    defaults: { run: { shell: pwsh } }
    steps: [
      uses: actions/checkout@v7,
      { uses: ./.github/actions/gate, with: { file1: jsr.json, file2: package.json }, id: v },
    ]
  ci: { uses: ./.github/workflows/ci.yml }
  npm:
    needs: [gate, ci]
    uses: ./.github/workflows/publish-npm.yml
    secrets: inherit
  jsr:
    needs: [gate, ci]
    uses: ./.github/workflows/publish-jsr.yml
